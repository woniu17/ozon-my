<!doctype html>
<html lang="zh-CN" translate="no">
  <head>
    <meta charset="UTF-8" />
    <title>MY 深度采集管理</title>
    <link rel="stylesheet" href="index.css" />
  </head>
  <body>
    <!-- ============ Sticky toolbar ============ -->
    <header class="toolbar">
      <div class="tb-l">
        <span class="tb-icon" id="tb-icon"></span>
        <div class="tb-title-block">
          <div class="tb-title">深度采集管理</div>
          <div class="tb-sub">从 ERP 缓存加载店铺商品 → 勾选 → 手动触发 8 类深度采集</div>
        </div>
      </div>

      <span class="tb-divider"></span>

      <span class="tb-conn">
        <span class="dot" id="sw-dot"></span>
        <span id="sw-text">SW 连接中…</span>
      </span>

      <div class="tb-r">
        <button class="tb-btn" id="btn-refresh" title="刷新店铺列表">
          <svg
            class="ic"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M21 12a9 9 0 1 1-9-9c2.49 0 4.76 1 6.42 2.62L21 8" />
            <polyline points="21 3 21 8 16 8" />
          </svg>
          刷新
        </button>
        <button class="tb-btn-primary" id="btn-start" disabled>开始采集</button>
        <button class="tb-btn-warn" id="btn-pause" style="display: none">暂停</button>
      </div>
    </header>

    <!-- ============ Notice ============ -->
    <div class="notice notice-error" id="auth-notice" style="display: none">
      <span id="auth-notice-text"></span>
    </div>

    <!-- ============ Body split layout ============ -->
    <main class="body">
      <!-- ============ Left column: store select + filters + table + progress ============ -->
      <div class="col-main">
        <!-- ============ Store select ============ -->
        <section class="card">
          <div class="card-head">
            <div class="card-title">
              店铺
              <span class="chip chip-info" id="store-count">0</span>
            </div>
            <div class="card-title-meta">
              <span class="card-head-hint">仅展示已采集 SKU 的店铺</span>
            </div>
          </div>
          <div class="card-body is-flush">
            <div class="seg">
              <div class="seg-row">
                <div class="seg-label"><span class="seg-req">*</span>选择店铺</div>
                <div class="seg-control">
                  <select id="store-select" class="fld">
                    <option value="">请先加载店铺列表…</option>
                  </select>
                </div>
                <button class="tb-btn" id="btn-load-skus" disabled>加载商品队列</button>
              </div>
            </div>
          </div>
        </section>

        <!-- ============ Filters ============ -->
        <section class="card" id="filter-card" style="display: none">
          <div class="card-head">
            <div class="card-title">
              筛选
              <span class="chip chip-info" id="filter-stat">0 / 0</span>
            </div>
            <div class="card-title-meta">
              <button class="link-btn" id="btn-reset-filter">重置</button>
            </div>
          </div>
          <div class="card-body">
            <div class="filter-grid">
              <div class="filter-row">
                <label class="filter-label">中国店铺</label>
                <select id="f-chinese" class="fld is-sm">
                  <option value="">全部</option>
                  <option value="yes">仅中国</option>
                  <option value="no">仅非中国</option>
                </select>
              </div>
              <div class="filter-row">
                <label class="filter-label">评论数 ≥</label>
                <input
                  type="number"
                  id="f-rating-min"
                  class="fld is-sm is-mono"
                  min="0"
                  placeholder="0"
                  style="width: 80px"
                />
              </div>
              <div class="filter-row">
                <label class="filter-label">价格 ₽</label>
                <input
                  type="number"
                  id="f-price-min"
                  class="fld is-sm is-mono"
                  placeholder="最低"
                  style="width: 80px"
                />
                <span class="filter-sep">~</span>
                <input
                  type="number"
                  id="f-price-max"
                  class="fld is-sm is-mono"
                  placeholder="最高"
                  style="width: 80px"
                />
              </div>
              <div class="filter-row">
                <label class="filter-label">重量 g</label>
                <input
                  type="number"
                  id="f-weight-min"
                  class="fld is-sm is-mono"
                  placeholder="最低"
                  style="width: 80px"
                />
                <span class="filter-sep">~</span>
                <input
                  type="number"
                  id="f-weight-max"
                  class="fld is-sm is-mono"
                  placeholder="最高"
                  style="width: 80px"
                />
                <span class="filter-tip">仅筛已采集</span>
              </div>
              <div class="filter-row">
                <label class="filter-label">采集状态</label>
                <select id="f-status" class="fld is-sm">
                  <option value="">全部</option>
                  <option value="pending">待采集</option>
                  <option value="running">采集中</option>
                  <option value="success">成功</option>
                  <option value="failed_final">失败</option>
                  <option value="failed_partial">部分失败</option>
                  <option value="skipped">跳过</option>
                </select>
              </div>
            </div>
          </div>
        </section>

        <!-- ============ Progress ============ -->
        <section class="card" id="progress-card" style="display: none">
          <div class="card-head">
            <div class="card-title">
              采集进度
              <span class="chip chip-primary" id="progress-stat">0 / 0</span>
            </div>
            <div class="card-title-meta">
              <span class="chip chip-success" id="progress-success" style="display: none">成功 0</span>
              <span class="chip chip-error" id="progress-failed" style="display: none">失败 0</span>
            </div>
          </div>
          <div class="card-body">
            <div class="progress-bar-wrap">
              <div class="progress-bar" id="progress-bar"></div>
            </div>
            <div class="running-row" id="running-row">
              <span class="running-label">正在采集:</span>
              <span class="running-list" id="running-list">—</span>
            </div>
          </div>
        </section>

        <!-- ============ Table ============ -->
        <section class="card table-card" id="table-card" style="display: none">
          <div class="card-head">
            <div class="card-title">
              商品队列
              <span class="chip chip-info" id="sku-count">0</span>
            </div>
          </div>
          <div class="card-body is-flush">
            <div class="table-wrap">
              <table class="sku-table" id="sku-table">
                <thead>
                  <tr>
                    <th class="c-img">图片</th>
                    <th class="c-sku">SKU</th>
                    <th class="c-rating">评论数</th>
                    <th class="c-price">价格</th>
                    <th class="c-weight">重量</th>
                    <th class="c-dim">尺寸</th>
                    <th class="c-chinese">中国</th>
                    <th class="c-status">状态</th>
                    <th class="c-finish">完成时间</th>
                    <th class="c-detail">缓存状态</th>
                  </tr>
                </thead>
                <tbody id="sku-tbody"></tbody>
              </table>
            </div>
          </div>
        </section>

        <p class="hint-foot" id="empty-hint">请先选择店铺并点「加载商品队列」</p>
      </div>
    </main>

    <script src="index.js"></script>
  </body>
</html>
