<!doctype html>
<html lang="zh-CN" translate="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MY</title>
    <link rel="stylesheet" href="popup.css" />
    <link rel="stylesheet" href="../collect/popup/collect-popup.css" />
  </head>
  <body>
    <div class="popup">
      <!-- Login View -->
      <section class="login-view" id="login-view">
        <div class="login-header">
          <div class="logo-area">
            <img src="../icons/icon48.png" class="logo-icon" alt="MY" />
            <span class="logo-text">MY</span>
          </div>
          <p class="login-subtitle">跨境电商选品采集工具</p>
        </div>

        <div class="login-card">
          <div class="login-tabs">
            <button class="tab-btn active" data-tab="sms">短信登录</button>
            <button class="tab-btn" data-tab="password">密码登录</button>
          </div>

          <div class="tab-panel active" id="tab-sms">
            <label class="field">
              <span>手机号</span>
              <input type="tel" id="sms-phone" placeholder="请输入手机号" autocomplete="tel" />
            </label>
            <label class="field">
              <span>短信验证码</span>
              <div class="captcha-row">
                <input type="text" id="sms-code" placeholder="请输入短信验证码" autocomplete="one-time-code" />
                <button class="btn btn-outline btn-sms" id="send-code-btn">获取验证码</button>
              </div>
            </label>
            <button class="btn btn-primary btn-block" id="sms-login-btn">登 录</button>
          </div>

          <div class="tab-panel" id="tab-password">
            <label class="field">
              <span>手机号</span>
              <input type="tel" id="login-phone" placeholder="请输入手机号" autocomplete="tel" />
            </label>
            <label class="field">
              <span>密码</span>
              <input type="password" id="login-password" placeholder="请输入密码" autocomplete="current-password" />
            </label>
            <button class="btn btn-primary btn-block" id="login-btn">登 录</button>
          </div>

          <div class="login-tip" id="login-tip"></div>

          <div class="login-divider">
            <span>或</span>
          </div>

          <button class="btn btn-outline btn-block" id="web-login-btn">
            <svg
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <circle cx="12" cy="12" r="10" />
              <line x1="2" y1="12" x2="22" y2="12" />
              <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z" />
            </svg>
            前往网页端登录
          </button>
          <div class="web-login-hint">在网页端登录后，插件将自动同步登录状态</div>
        </div>

        <div class="login-footer">
          <span class="server-status" id="server-status">
            <span class="status-dot"></span>
            <span class="status-text">检测服务器...</span>
          </span>
        </div>
      </section>

      <!-- Main View -->
      <section class="main-view" id="main-view">
        <header class="main-header">
          <div class="header-left">
            <img src="../icons/icon48.png" class="header-icon" alt="" />
            <span class="header-title">MY</span>
            <span class="header-version" id="header-version"></span>
          </div>
          <button class="btn btn-ghost" id="logout-btn">
            <svg
              width="14"
              height="14"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
              <polyline points="16 17 21 12 16 7" />
              <line x1="21" y1="12" x2="9" y2="12" />
            </svg>
            退出
          </button>
        </header>

        <div class="main-body">
          <!-- Update Banner（保留） -->
          <div class="update-banner" id="update-banner" style="display: none">
            <div class="update-banner-content">
              <div class="update-banner-icon">
                <svg
                  width="16"
                  height="16"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                  <polyline points="7 10 12 15 17 10" />
                  <line x1="12" y1="15" x2="12" y2="3" />
                </svg>
              </div>
              <div class="update-banner-text">
                <span class="update-banner-title">发现新版本 <strong id="update-version"></strong></span>
                <span class="update-banner-sub">当前版本: <span id="current-version"></span></span>
              </div>
            </div>
            <div class="update-banner-actions">
              <button class="btn btn-ghost btn-sm" id="dismiss-update-btn">忽略</button>
              <button class="btn btn-primary btn-sm" id="download-update-btn">立即更新</button>
            </div>
          </div>

          <!-- Store + Auth combined card -->
          <div class="store-card" id="store-card">
            <div class="store-l">
              <div class="store-home" id="store-home">
                <svg
                  width="14"
                  height="14"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
                  <polyline points="9 22 9 12 15 12 15 22" />
                </svg>
              </div>
              <div class="store-info">
                <span class="store-name" id="store-name">加载中...</span>
                <span class="store-auth" id="store-auth"
                  ><span class="auth-dot"></span><span class="auth-text">检测中...</span></span
                >
              </div>
            </div>
            <button class="seller-portal-btn" id="seller-portal-btn" type="button" title="打开 seller.ozon.ru 卖家后台">
              <svg
                width="11"
                height="11"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2.5"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" />
                <polyline points="15 3 21 3 21 9" />
                <line x1="10" y1="14" x2="21" y2="3" />
              </svg>
              <span id="seller-portal-label">查看</span>
            </button>
            <div class="store-r" id="store-r">
              <button class="switch-btn">
                切换<svg
                  width="12"
                  height="12"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2.5"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <polyline points="6 9 12 15 18 9" />
                </svg>
              </button>
              <select id="store-select" aria-label="切换店铺"></select>
            </div>
            <button class="sync-btn" id="sync-cookie-btn" style="display: none">
              <svg
                width="11"
                height="11"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2.5"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <polyline points="23 4 23 10 17 10" />
                <polyline points="1 20 1 14 7 14" />
                <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15" />
              </svg>
              <span>同步 Cookie</span>
            </button>
          </div>

          <!-- "今日" 摘要 + 信号卡区 -->
          <div class="today">
            <span class="today-label">今日</span>
            <span class="today-count" id="today-count">…</span>
          </div>
          <div class="signals" id="signals"></div>

          <!-- 采集器实时大屏（仅当有活跃 tab 时显示） -->
          <div class="nav-section collector-mon" id="collector-mon-section" style="display: none">
            <div class="nav-title">采集器实时状态</div>
            <div class="collector-mon-list" id="collector-mon-list"></div>
          </div>

          <!-- Local Browser Agent 任务状态（仅当有运行中任务时显示） -->
          <div class="nav-section browser-agent" id="browser-agent-section" style="display: none">
            <div class="nav-title">AI Agent 任务</div>
            <div class="browser-agent-card">
              <span class="browser-agent-dot"></span>
              <div class="browser-agent-body">
                <div class="browser-agent-title" id="browser-agent-title">AI Agent 任务</div>
                <div class="browser-agent-meta" id="browser-agent-meta">正在执行</div>
                <div class="browser-agent-progress">
                  <span class="browser-agent-progress-bar" id="browser-agent-progress-bar"></span>
                </div>
              </div>
              <button class="browser-agent-stop-btn" id="browser-agent-stop-btn">停止</button>
            </div>
          </div>

          <!-- 自动采集卡片(popup 简化视图:浅度+深度双开关 + 今日计数 + 熔断简略提示。
               限速/自动翻页/筛选/只采集中国店铺等详细配置在 QX 面板,不在此暴露) -->
          <div class="card auto-collect-card">
            <div class="card-header">
              <span class="card-title">自动采集</span>
              <span class="status-dot" id="ac-status-dot"></span>
            </div>
            <div class="card-body">
              <label class="qx-switch">
                <input type="checkbox" id="ac-shallow-toggle" />
                <span class="qx-switch-track"><span class="qx-switch-knob"></span></span>
                <span class="qx-switch-label">浅度采集</span>
              </label>
              <label class="qx-switch">
                <input type="checkbox" id="ac-deep-toggle" />
                <span class="qx-switch-track"><span class="qx-switch-knob"></span></span>
                <span class="qx-switch-label">深度采集</span>
              </label>
              <div class="ac-stats">
                <span>今日已采: <strong id="ac-today-count">0</strong></span>
              </div>
              <div class="ac-paused" id="ac-paused" style="display: none">
                <span class="ac-warning">⚠ 熔断中</span>
                <span id="ac-paused-countdown"></span>
              </div>
              <!-- 限速配置(可折叠):队列间隔范围(秒)/每日上限。
                   字段对应 jz-auto-collect-config 中 consumeRateMinSec/consumeRateMaxSec/perDayLimit。
                   每次消费在 [min, max] 内取随机值(反爬+拟人化)。 -->
              <div class="ac-ratecfg" id="ac-ratecfg">
                <button class="ac-ratecfg-toggle" id="ac-ratecfg-toggle" type="button">
                  <span>限速配置</span>
                  <svg
                    class="ac-ratecfg-chevron"
                    width="10"
                    height="10"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2.5"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  >
                    <polyline points="6 9 12 15 18 9" />
                  </svg>
                </button>
                <div class="ac-ratecfg-body" id="ac-ratecfg-body" style="display: none">
                  <label class="ac-ratecfg-row ac-ratecfg-row-range">
                    <span class="ac-ratecfg-label">队列间隔</span>
                    <span class="ac-ratecfg-range">
                      <input type="number" id="ac-rate-sku-min" min="5" max="120" step="1" data-unit="s" placeholder="5" />
                      <span class="ac-ratecfg-sep">~</span>
                      <input type="number" id="ac-rate-sku-max" min="5" max="120" step="1" data-unit="s" placeholder="15" />
                      <span class="ac-ratecfg-unit">s</span>
                    </span>
                  </label>
                  <label class="ac-ratecfg-row">
                    <span class="ac-ratecfg-label">每日上限</span>
                    <input type="number" id="ac-rate-perday" min="0" max="100000" step="50" data-unit="个" />
                    <span class="ac-ratecfg-unit">个</span>
                  </label>
                  <div class="ac-ratecfg-hint" id="ac-ratecfg-hint"></div>
                </div>
              </div>
            </div>
          </div>

          <!-- Nav: 商品管理 -->
          <div class="nav-section">
            <div class="nav-title">商品管理</div>
            <div class="nav-grid">
              <button class="nav-cell" data-action="products">
                <span class="nav-cell-icon"
                  ><svg
                    width="18"
                    height="18"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  >
                    <rect x="2" y="3" width="20" height="14" rx="2" />
                    <line x1="8" y1="21" x2="16" y2="21" />
                    <line x1="12" y1="17" x2="12" y2="21" /></svg
                ></span>
                <span>商品列表</span>
                <span class="nav-cell-badge is-muted" id="nav-badge-products" style="display: none">0</span>
              </button>
              <button class="nav-cell" data-action="collect-box">
                <span class="nav-cell-icon"
                  ><svg
                    width="18"
                    height="18"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  >
                    <rect x="2" y="7" width="20" height="14" rx="2" ry="2" />
                    <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16" /></svg
                ></span>
                <span>采集箱</span>
              </button>
              <button class="nav-cell" data-action="batch-upload">
                <span class="nav-cell-icon"
                  ><svg
                    width="18"
                    height="18"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  >
                    <polyline points="13 2 3 14 12 14 11 22 21 10 12 10 13 2" /></svg
                ></span>
                <span>批量上架</span>
              </button>
              <button class="nav-cell" data-action="collect-manager">
                <span class="nav-cell-icon"
                  ><svg
                    width="18"
                    height="18"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  >
                    <path
                      d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"
                    />
                    <polyline points="3.27 6.96 12 12.01 20.73 6.96" />
                    <line x1="12" y1="22.08" x2="12" y2="12" /></svg
                ></span>
                <span>深度采集</span>
              </button>
              <button class="nav-cell" data-action="collect-queue">
                <span class="nav-cell-icon"
                  ><svg
                    width="18"
                    height="18"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  >
                    <line x1="8" y1="6" x2="21" y2="6" />
                    <line x1="8" y1="12" x2="21" y2="12" />
                    <line x1="8" y1="18" x2="21" y2="18" />
                    <line x1="3" y1="6" x2="3.01" y2="6" />
                    <line x1="3" y1="12" x2="3.01" y2="12" />
                    <line x1="3" y1="18" x2="3.01" y2="18" /></svg
                ></span>
                <span>采集队列</span>
              </button>
              <button class="nav-cell" data-action="import-history">
                <span class="nav-cell-icon"
                  ><svg
                    width="18"
                    height="18"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  >
                    <polyline points="16 16 12 12 8 16" />
                    <line x1="12" y1="12" x2="12" y2="21" />
                    <path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3" /></svg
                ></span>
                <span>上架记录</span>
              </button>
              <button class="nav-cell" data-action="reshelf">
                <span class="nav-cell-icon"
                  ><svg
                    width="18"
                    height="18"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  >
                    <polyline points="1 4 1 10 7 10" />
                    <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10" /></svg
                ></span>
                <span>下架重上</span>
              </button>
            </div>
          </div>

          <!-- Nav: 工具与分析 -->
          <div class="nav-section">
            <div class="nav-title">工具与分析</div>
            <div class="nav-grid">
              <button class="nav-cell" data-action="pricing">
                <span class="nav-cell-icon"
                  ><svg
                    width="18"
                    height="18"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  >
                    <rect x="4" y="2" width="16" height="20" rx="2" />
                    <line x1="8" y1="6" x2="16" y2="6" />
                    <line x1="8" y1="10" x2="10" y2="10" />
                    <line x1="13" y1="10" x2="16" y2="10" />
                    <line x1="8" y1="14" x2="10" y2="14" />
                    <line x1="13" y1="14" x2="16" y2="14" />
                    <line x1="8" y1="18" x2="10" y2="18" />
                    <line x1="13" y1="18" x2="16" y2="18" /></svg
                ></span>
                <span>MY 算价</span>
              </button>
              <button class="nav-cell" data-action="watermark">
                <span class="nav-cell-icon"
                  ><svg
                    width="18"
                    height="18"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  >
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2" />
                    <circle cx="8.5" cy="8.5" r="1.5" />
                    <polyline points="21 15 16 10 5 21" /></svg
                ></span>
                <span>水印管理</span>
              </button>
              <button class="nav-cell" data-action="stores">
                <span class="nav-cell-icon"
                  ><svg
                    width="18"
                    height="18"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  >
                    <circle cx="12" cy="12" r="3" />
                    <path
                      d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"
                    /></svg
                ></span>
                <span>店铺管理</span>
              </button>
              <button class="nav-cell" data-action="premium-pivot">
                <span class="nav-cell-icon"
                  ><svg
                    width="18"
                    height="18"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  >
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                    <circle cx="12" cy="12" r="3" /></svg
                ></span>
                <span>数据透视眼</span>
                <span class="nav-cell-badge premium-badge" id="nav-badge-premium">关</span>
              </button>
              <button class="nav-cell" data-action="data-panel">
                <span class="nav-cell-icon"
                  ><svg
                    width="18"
                    height="18"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  >
                    <line x1="18" y1="20" x2="18" y2="10" />
                    <line x1="12" y1="20" x2="12" y2="4" />
                    <line x1="6" y1="20" x2="6" y2="14" />
                    <line x1="3" y1="20" x2="21" y2="20" /></svg
                ></span>
                <span>数据面板</span>
                <span class="nav-cell-badge premium-badge is-on" id="nav-badge-data-panel">开</span>
              </button>
              <!-- 同步 IndexedDB 缓存到 MongoDB(手动触发,立即扫描 L1 中所有未同步记录补写 L2) -->
              <button class="nav-cell" id="cache-sync-btn" type="button">
                <span class="nav-cell-icon"
                  ><svg
                    width="18"
                    height="18"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  >
                    <polyline points="23 4 23 10 17 10" />
                    <polyline points="1 20 1 14 7 14" />
                    <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15" /></svg
                ></span>
                <span id="cache-sync-label">同步缓存(8 类)</span>
              </button>
              <!-- 批量采集器入口:暂隐藏(2026-05-30)。功能状态默认关闭(ozon_collector_enabled
                   未设置时即 false),此处仅隐藏 popup 入口,不下线功能 —— storage 里已显式开启的
                   状态仍生效,采集器代码逻辑保持不变。重新对外开放时去掉 style="display:none" 即可。 -->
              <button class="nav-cell" data-action="collector" style="display: none">
                <span class="nav-cell-icon"
                  ><svg
                    width="18"
                    height="18"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  >
                    <path
                      d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"
                    />
                    <polyline points="3.27 6.96 12 12.01 20.73 6.96" />
                    <line x1="12" y1="22.08" x2="12" y2="12" /></svg
                ></span>
                <span>MY 采集器</span>
                <span class="nav-cell-badge premium-badge is-on" id="nav-badge-collector">开</span>
              </button>
            </div>
          </div>

          <!-- Main CTA -->
          <button class="cta" data-action="dashboard">
            <svg
              width="14"
              height="14"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <rect x="3" y="3" width="7" height="7" />
              <rect x="14" y="3" width="7" height="7" />
              <rect x="14" y="14" width="7" height="7" />
              <rect x="3" y="14" width="7" height="7" />
            </svg>
            <span>打开 MY ERP</span>
            <svg
              width="13"
              height="13"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <line x1="5" y1="12" x2="19" y2="12" />
              <polyline points="12 5 19 12 12 19" />
            </svg>
          </button>
        </div>
      </section>
    </div>
    <script src="popup.js"></script>
