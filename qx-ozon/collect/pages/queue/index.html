<!doctype html>
<html lang="zh-CN" translate="no">
  <head>
    <meta charset="UTF-8" />
    <title>SW 采集队列监控</title>
    <link rel="stylesheet" href="index.css" />
  </head>
  <body>
    <!-- ============ Sticky toolbar ============ -->
    <header class="toolbar">
      <div class="tb-l">
        <span class="tb-icon"></span>
        <div class="tb-title-block">
          <div class="tb-title">采集队列监控</div>
          <div class="tb-sub">实时展示 SW 队列任务状态 · 2-5 秒自适应刷新</div>
        </div>
      </div>

      <span class="tb-divider"></span>

      <span class="tb-conn">
        <span class="dot" id="sw-dot"></span>
        <span id="sw-text">SW 连接中…</span>
      </span>

      <span class="tb-divider"></span>

      <span class="tb-auto">
        <span id="auto-status">自动采集: ?</span>
      </span>

      <div class="tb-r">
        <label class="inline-check">
          <input type="checkbox" id="auto-refresh" checked />
          <span>自动刷新</span>
        </label>
        <button class="tb-btn" id="btn-refresh" title="立即刷新">
          <svg
            class="ic"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M21 12a9 9 0 1 1-9-9c2.49 0 4.76 1 6.42 2.62L21 8" />
            <polyline points="21 3 21 8 16 8" />
          </svg>
          刷新
        </button>
        <button class="tb-btn" id="btn-clear-antibot" title="强制清除反爬熔断状态">清除反爬</button>
        <button class="tb-btn-warn" id="btn-clear-finished">清空已完成</button>
      </div>
    </header>

    <!-- ============ Notice ============ -->
    <div class="notice notice-error" id="auth-notice" style="display: none">
      <span id="auth-notice-text"></span>
    </div>

    <!-- ============ Body ============ -->
    <main class="body">
      <!-- ============ Collect config (switches + rate) ============ -->
      <section class="card">
        <div class="card-head">
          <div class="card-title">采集配置</div>
          <div class="card-title-meta">
            <span class="card-head-hint">采集开关与队列限速</span>
          </div>
        </div>
        <div class="card-body">
          <div class="switch-grid">
            <label class="qx-switch">
              <input type="checkbox" id="sw-deep-toggle" />
              <span class="qx-switch-track"><span class="qx-switch-knob"></span></span>
              <span class="qx-switch-label">深度采集</span>
            </label>
            <label class="qx-switch">
              <input type="checkbox" id="sw-shallow-toggle" />
              <span class="qx-switch-track"><span class="qx-switch-knob"></span></span>
              <span class="qx-switch-label">浅度采集</span>
            </label>
          </div>
          <div class="ratecfg-grid">
            <div class="ratecfg-row">
              <label class="ratecfg-label" for="rate-min">队列间隔</label>
              <div class="ratecfg-range">
                <input type="number" id="rate-min" class="fld is-sm" min="5" max="120" step="1" placeholder="5" />
                <span class="ratecfg-sep">~</span>
                <input type="number" id="rate-max" class="fld is-sm" min="5" max="120" step="1" placeholder="15" />
                <span class="ratecfg-unit">秒</span>
              </div>
            </div>
            <div class="ratecfg-hint" id="rate-hint"></div>
          </div>
        </div>
      </section>

      <!-- ============ Stats overview ============ -->
      <section class="card">
        <div class="card-head">
          <div class="card-title">队列概览</div>
          <div class="card-title-meta">
            <span class="card-head-hint" id="last-update">尚未加载</span>
          </div>
        </div>
        <div class="card-body">
          <div class="stats-group">
            <div class="stats-group-title">队列任务</div>
            <div class="stats-grid">
              <div class="stat-cell">
                <div class="stat-label">待采集</div>
                <div class="stat-value stat-pending" id="stat-pending">0</div>
              </div>
              <div class="stat-cell">
                <div class="stat-label">采集中</div>
                <div class="stat-value stat-running" id="stat-running">0</div>
              </div>
              <div class="stat-cell">
                <div class="stat-label">已完成</div>
                <div class="stat-value stat-success" id="stat-finished">0</div>
              </div>
              <div class="stat-cell">
                <div class="stat-label">今日完成</div>
                <div class="stat-value stat-success" id="stat-today">
                  <span id="stat-today-main">0</span>
                  <span class="stat-sub" id="stat-today-sub"></span>
                </div>
              </div>
            </div>
          </div>
          <div class="stats-group">
            <div class="stats-group-title">运行状态</div>
            <div class="stats-grid">
              <div class="stat-cell">
                <div class="stat-label">队列状态</div>
                <div class="stat-value" id="stat-paused">-</div>
              </div>
              <div class="stat-cell">
                <div class="stat-label">失败 / 反爬</div>
                <div class="stat-value" id="stat-failed-antibot">0 / 0</div>
              </div>
              <div class="stat-cell">
                <div class="stat-label">上次消费</div>
                <div class="stat-value" id="stat-last-consume">—</div>
              </div>
              <div class="stat-cell">
                <div class="stat-label">下次执行</div>
                <div class="stat-value" id="stat-next-run">—</div>
              </div>
            </div>
          </div>
        </div>
      </section>

      <!-- ============ Task window (carousel) ============ -->
      <section class="card">
        <div class="card-head">
          <div class="card-title">
            队列任务
            <span class="card-head-hint">左侧即将采集,中间为采集中,右侧已完成</span>
          </div>
          <div class="card-title-meta">
            <span class="card-head-hint" id="window-status-hint">—</span>
          </div>
        </div>
        <div class="card-body">
          <div class="task-window" id="task-window">
            <div class="tw-slot tw-slot-left-2" data-pos="-2"></div>
            <div class="tw-slot tw-slot-left-1" data-pos="-1"></div>
            <div class="tw-slot tw-slot-center" data-pos="0"></div>
            <div class="tw-slot tw-slot-right-1" data-pos="1"></div>
            <div class="tw-slot tw-slot-right-2" data-pos="2"></div>
          </div>
          <div class="tw-empty" id="tw-empty" style="display: none">暂无队列任务</div>
        </div>
      </section>

      <p class="hint-foot" id="empty-hint">正在加载队列…</p>
    </main>

    <script src="index.js"></script>
  </body>
</html>
