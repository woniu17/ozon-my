<!doctype html>
<html lang="zh-CN" translate="no">
  <head>
    <meta charset="UTF-8" />
    <title>SW 采集队列监控</title>
    <link rel="stylesheet" href="index.css" />
  </head>
  <body>
    <!-- ============ Sticky toolbar ============ -->
    <header class="toolbar">
      <div class="tb-l">
        <span class="tb-icon"></span>
        <div class="tb-title-block">
          <div class="tb-title">采集队列监控</div>
          <div class="tb-sub">实时展示 SW 队列任务状态 · 2-5 秒自适应刷新</div>
        </div>
      </div>

      <span class="tb-divider"></span>

      <span class="tb-conn">
        <span class="dot" id="sw-dot"></span>
        <span id="sw-text">SW 连接中…</span>
      </span>

      <span class="tb-divider"></span>

      <span class="tb-auto">
        <span id="auto-status">自动采集: ?</span>
      </span>

      <div class="tb-r">
        <label class="inline-check">
          <input type="checkbox" id="auto-refresh" checked />
          <span>自动刷新</span>
        </label>
        <button class="tb-btn" id="btn-refresh" title="立即刷新">
          <svg
            class="ic"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M21 12a9 9 0 1 1-9-9c2.49 0 4.76 1 6.42 2.62L21 8" />
            <polyline points="21 3 21 8 16 8" />
          </svg>
          刷新
        </button>
        <button class="tb-btn" id="btn-clear-antibot" title="强制清除反爬熔断状态">清除反爬</button>
        <button class="tb-btn-warn" id="btn-clear-finished">清空已完成</button>
      </div>
    </header>

    <!-- ============ Notice ============ -->
    <div class="notice notice-error" id="auth-notice" style="display: none">
      <span id="auth-notice-text"></span>
    </div>

    <!-- ============ Body ============ -->
    <main class="body">
      <!-- ============ Collect config (switches + rate) ============ -->
      <section class="card">
        <div class="card-head">
          <div class="card-title">采集配置</div>
          <div class="card-title-meta">
            <span class="card-head-hint">采集开关与队列限速</span>
          </div>
        </div>
        <div class="card-body">
          <div class="switch-grid">
            <label class="qx-switch">
              <input type="checkbox" id="sw-deep-toggle" />
              <span class="qx-switch-track"><span class="qx-switch-knob"></span></span>
              <span class="qx-switch-label">深度采集</span>
            </label>
            <label class="qx-switch">
              <input type="checkbox" id="sw-shallow-toggle" />
              <span class="qx-switch-track"><span class="qx-switch-knob"></span></span>
              <span class="qx-switch-label">浅度采集</span>
            </label>
          </div>
          <div class="ratecfg-grid">
            <div class="ratecfg-row">
              <label class="ratecfg-label" for="rate-min">队列间隔</label>
              <div class="ratecfg-range">
                <input type="number" id="rate-min" class="fld is-sm" min="5" max="120" step="1" placeholder="5" />
                <span class="ratecfg-sep">~</span>
                <input type="number" id="rate-max" class="fld is-sm" min="5" max="120" step="1" placeholder="15" />
                <span class="ratecfg-unit">秒</span>
              </div>
            </div>
            <div class="ratecfg-row">
              <label class="ratecfg-label" for="rate-perday">每日上限</label>
              <div class="ratecfg-range">
                <input type="number" id="rate-perday" class="fld is-sm" min="0" max="100000" step="50" placeholder="2000" />
                <span class="ratecfg-unit">个</span>
              </div>
            </div>
            <div class="ratecfg-hint" id="rate-hint"></div>
          </div>
        </div>
      </section>

      <!-- ============ Stats overview ============ -->
      <section class="card">
        <div class="card-head">
          <div class="card-title">队列概览</div>
          <div class="card-title-meta">
            <span class="card-head-hint" id="last-update">尚未加载</span>
          </div>
        </div>
        <div class="card-body">
          <div class="stats-grid">
            <div class="stat-cell">
              <div class="stat-label">总数</div>
              <div class="stat-value" id="stat-total">0</div>
            </div>
            <div class="stat-cell">
              <div class="stat-label">待采集</div>
              <div class="stat-value stat-pending" id="stat-pending">0</div>
            </div>
            <div class="stat-cell">
              <div class="stat-label">采集中</div>
              <div class="stat-value stat-running" id="stat-running">0</div>
            </div>
            <div class="stat-cell">
              <div class="stat-label">已完成</div>
              <div class="stat-value stat-success" id="stat-finished">0</div>
            </div>
            <div class="stat-cell">
              <div class="stat-label">今日采集</div>
              <div class="stat-value" id="stat-today">0 / 0</div>
            </div>
            <div class="stat-cell">
              <div class="stat-label">队列状态</div>
              <div class="stat-value" id="stat-paused">-</div>
            </div>
            <div class="stat-cell">
              <div class="stat-label">下次执行</div>
              <div class="stat-value" id="stat-next-run">—</div>
            </div>
          </div>
        </div>
      </section>

      <!-- ============ Task window (carousel) ============ -->
      <section class="card">
        <div class="card-head">
          <div class="card-title">
            队列任务
            <span class="card-head-hint">左侧即将采集,中间为采集中,右侧已完成</span>
          </div>
          <div class="card-title-meta">
            <span class="card-head-hint" id="window-status-hint">—</span>
          </div>
        </div>
        <div class="card-body">
          <div class="task-window" id="task-window">
            <div class="tw-slot tw-slot-left-2" data-pos="-2"></div>
            <div class="tw-slot tw-slot-left-1" data-pos="-1"></div>
            <div class="tw-slot tw-slot-center" data-pos="0"></div>
            <div class="tw-slot tw-slot-right-1" data-pos="1"></div>
            <div class="tw-slot tw-slot-right-2" data-pos="2"></div>
          </div>
          <div class="tw-empty" id="tw-empty" style="display: none">暂无队列任务</div>
        </div>
      </section>

      <!-- ============ Filters (collapsible) ============ -->
      <section class="card">
        <div class="card-head">
          <div class="card-title">
            <button class="filter-toggle" id="btn-toggle-filter" aria-expanded="false">
              <svg class="chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="6 9 12 15 18 9" />
              </svg>
              筛选
              <span class="chip chip-info" id="filter-stat">0 / 0</span>
            </button>
          </div>
          <div class="card-title-meta">
            <button class="link-btn" id="btn-reset-filter">重置</button>
          </div>
        </div>
        <div class="card-body filter-body" id="filter-body" style="display: none">
          <div class="filter-grid">
            <div class="filter-row">
              <label class="filter-label">状态</label>
              <select id="f-status" class="fld is-sm">
                <option value="">全部</option>
                <option value="pending">待采集</option>
                <option value="running">采集中</option>
                <option value="success">成功</option>
                <option value="partial">部分</option>
                <option value="failed_final">失败</option>
                <option value="failed_partial">部分失败</option>
                <option value="failed_retry">重试中</option>
                <option value="skipped">跳过</option>
                <option value="antibot">反爬</option>
              </select>
            </div>
            <div class="filter-row">
              <label class="filter-label">来源</label>
              <select id="f-source" class="fld is-sm">
                <option value="">全部</option>
                <option value="shop-page">自动(店铺页)</option>
              </select>
            </div>
            <div class="filter-row">
              <label class="filter-label">店铺</label>
              <input
                type="text"
                id="f-store"
                class="fld is-sm is-mono"
                placeholder="seller slug"
                style="width: 160px"
              />
            </div>
            <div class="filter-row">
              <label class="filter-label">SKU</label>
              <input type="text" id="f-sku" class="fld is-sm is-mono" placeholder="搜索 SKU" style="width: 160px" />
            </div>
          </div>
          <div class="table-wrap" style="margin-top: 12px">
            <table class="sku-table" id="queue-table">
              <thead>
                <tr>
                  <th class="c-sku">SKU</th>
                  <th class="c-store">卖家</th>
                  <th class="c-source">来源</th>
                  <th class="c-status">状态</th>
                  <th class="c-attempts">尝试</th>
                  <th class="c-created">创建时间</th>
                  <th class="c-started">开始时间</th>
                  <th class="c-finish">完成时间</th>
                  <th class="c-duration">耗时</th>
                  <th class="c-error">最后错误</th>
                </tr>
              </thead>
              <tbody id="queue-tbody"></tbody>
            </table>
          </div>
        </div>
      </section>

      <p class="hint-foot" id="empty-hint">正在加载队列…</p>
    </main>

    <script src="index.js"></script>
  </body>
</html>
