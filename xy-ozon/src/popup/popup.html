<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="popup">
      <!-- 登录视图 -->
      <section class="login-view" id="login-view">
        <div class="login-header">
          <div class="logo-area">
            <span class="logo-icon">M</span>
            <span class="logo-text">MY</span>
          </div>
          <p class="login-subtitle">跨境电商选品采集工具</p>
        </div>
        <div class="login-card">
          <div class="login-tabs">
            <button class="tab-btn active" data-tab="sms">短信登录</button>
            <button class="tab-btn" data-tab="password">密码登录</button>
          </div>
          <!-- 短信面板 -->
          <div class="tab-panel active" id="tab-sms">
            <label class="field"
              >手机号<input type="tel" id="sms-phone" placeholder="请输入手机号" class="fld"
            /></label>
            <label class="field"
              >验证码
              <div class="captcha-row">
                <input type="text" id="sms-code" placeholder="短信验证码" class="fld" />
                <button class="btn btn-outline btn-sms" id="send-code-btn">获取验证码</button>
              </div></label
            >
            <button class="btn btn-primary btn-block" id="sms-login-btn">登 录</button>
          </div>
          <!-- 密码面板 -->
          <div class="tab-panel" id="tab-password">
            <label class="field"
              >手机号<input type="tel" id="login-phone" placeholder="请输入手机号" class="fld"
            /></label>
            <label class="field"
              >密码<input type="password" id="login-password" placeholder="请输入密码" class="fld"
            /></label>
            <button class="btn btn-primary btn-block" id="login-btn">登 录</button>
          </div>
          <div class="login-tip" id="login-tip"></div>
          <div class="login-divider"><span>或</span></div>
          <button class="btn btn-outline btn-block" id="web-login-btn">前往网页端登录</button>
          <div class="web-login-hint">在网页端登录后,插件将自动同步登录状态</div>
        </div>
        <div class="login-footer">
          <span class="server-status connected" id="server-status">
            <span class="status-dot"></span><span class="status-text">已连接服务器</span>
          </span>
        </div>
      </section>

      <!-- 主视图 -->
      <section class="main-view" id="main-view">
        <header class="main-header">
          <div class="header-left">
            <span class="header-icon">M</span>
            <span class="header-title">MY</span>
            <span class="header-version">v0.13.31.1</span>
          </div>
          <button class="btn btn-ghost" id="logout-btn">退出</button>
        </header>
        <div class="main-body">
          <!-- 版本更新横幅(隐藏) -->
          <div class="update-banner" id="update-banner" style="display: none"></div>
          <!-- 店铺卡 -->
          <div class="store-card" id="store-card">
            <div class="store-l">
              <div class="store-home">🏠</div>
              <div class="store-info">
                <select id="store-select" class="store-select" disabled>
                  <option value="">加载中...</option>
                </select>
                <span class="store-auth ok" id="store-auth">
                  <span class="auth-dot"></span><span class="auth-text">已授权</span>
                </span>
              </div>
            </div>
            <button class="seller-portal-btn" id="seller-portal-btn">查看</button>
          </div>
          <!-- 今日 + 信号卡 -->
          <div class="today">
            <span class="today-label">今日</span><span class="today-count" id="today-count">0 信号</span>
          </div>
          <div class="signals" id="signals">
            <div class="sig is-neutral">
              <div class="sig-icon">✓</div>
              <div class="sig-body"><div class="sig-title">没有待处理任务</div></div>
            </div>
          </div>
          <!-- 商品管理导航 -->
          <div class="nav-section">
            <div class="nav-title">商品管理</div>
            <div class="nav-grid">
              <button class="nav-cell" data-action="products">
                <span class="nav-cell-icon">📋</span><span>商品列表</span>
              </button>
              <button class="nav-cell" data-action="collect-box">
                <span class="nav-cell-icon">📦</span><span>采集箱</span>
              </button>
              <button class="nav-cell" data-action="batch-upload">
                <span class="nav-cell-icon">📤</span><span>批量上架</span>
              </button>
              <button class="nav-cell" data-action="import-history">
                <span class="nav-cell-icon">📜</span><span>上架记录</span>
              </button>
              <button class="nav-cell" data-action="reshelf">
                <span class="nav-cell-icon">🔄</span><span>下架重上</span>
              </button>
            </div>
          </div>
          <!-- 工具与分析导航 -->
          <div class="nav-section">
            <div class="nav-title">工具与分析</div>
            <div class="nav-grid">
              <button class="nav-cell" data-action="pricing">
                <span class="nav-cell-icon">💰</span><span>MY 算价</span>
              </button>
              <button class="nav-cell" data-action="watermark">
                <span class="nav-cell-icon">💧</span><span>水印管理</span>
              </button>
              <button class="nav-cell" data-action="stores">
                <span class="nav-cell-icon">🏪</span><span>店铺管理</span>
              </button>
              <button class="nav-cell" data-action="data-panel">
                <span class="nav-cell-icon">📊</span><span>数据面板</span
                ><span class="nav-cell-badge premium-badge is-on">开</span>
              </button>
            </div>
          </div>
          <!-- 打开 ERP -->
          <button class="cta" data-action="dashboard"><span>打开 MY ERP</span></button>
        </div>
      </section>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
